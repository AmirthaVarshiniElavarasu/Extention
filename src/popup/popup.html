<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email to Google Sheet</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📧 Email to Sheet</h1>
            <button id="settingsBtn" class="settings-btn" title="Open Settings">⚙️</button>
        </div>

        <div id="syncStatus" class="status-box hidden">
            <div class="status-indicator"></div>
            <div class="status-text"></div>
        </div>

        <div id="content" class="content">
            <div class="section">
                <h2>Quick Actions</h2>
                <button id="syncNowBtn" class="btn btn-primary">🔄 Sync Now</button>
                <button id="testConnectionBtn" class="btn btn-secondary">🧪 Test Connection</button>
            </div>

            <div class="section">
                <h2>Status</h2>
                <div id="statusInfo" class="status-info">
                    <div class="status-item">
                        <span class="label">Email Account:</span>
                        <span id="emailStatus" class="value">Not connected</span>
                    </div>
                    <div class="status-item">
                        <span class="label">Google Sheets:</span>
                        <span id="sheetsStatus" class="value">Not connected</span>
                    </div>
                    <div class="status-item">
                        <span class="label">Last Sync:</span>
                        <span id="lastSyncTime" class="value">Never</span>
                    </div>
                    <div class="status-item">
                        <span class="label">Total Synced:</span>
                        <span id="totalSynced" class="value">0 emails</span>
                    </div>
                </div>
            </div>

            <div class="section">
                <h2>Recent Activity</h2>
                <div id="activityLog" class="activity-log">
                    <p class="empty">No recent activity</p>
                </div>
            </div>

            <div class="section">
                <h2>Configure</h2>
                <button id="authorizeBtn" class="btn btn-secondary">🔐 Authorize Accounts</button>
                <button id="openSettingsBtn" class="btn btn-secondary">⚙️ Open Settings</button>
            </div>
        </div>

        <div id="loadingSpinner" class="spinner hidden">
            <div class="spinner-ring"></div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
